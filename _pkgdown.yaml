url: https://insightsengineering.github.io/teal.picks/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, news]
    right: [search, github]

reference:
  - title: Picks
    desc: Define hierarchical data selections
    contents:
      - picks
      - datasets
      - variables
      - values

